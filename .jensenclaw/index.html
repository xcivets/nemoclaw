<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JensenClaw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Courier New', Consolas, monospace;
    background: #0a0a0a;
    color: #33ff33;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    text-shadow: 0 0 5px rgba(51, 255, 51, 0.5);
  }

  /* Jensen ghost image burned into the phosphor */
  #jensen-ghost {
    position: fixed;
    bottom: -5%;
    right: 5%;
    height: 85vh;
    opacity: 0.18;
    filter: grayscale(100%) brightness(1.5) sepia(100%) hue-rotate(70deg) saturate(4);
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse at center 60%, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 70%);
    -webkit-mask-image: radial-gradient(ellipse at center 60%, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 70%);
  }

  /* CRT scanline overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.15) 2px,
      rgba(0, 0, 0, 0.15) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* CRT flicker */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(51, 255, 51, 0.03);
    animation: flicker 0.15s infinite alternate;
    pointer-events: none;
    z-index: 999;
  }

  @keyframes flicker {
    0% { opacity: 0.97; }
    100% { opacity: 1; }
  }

  .header-bar {
    background: #33ff33;
    color: #000;
    padding: 2px 8px;
    font-size: 13px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
    letter-spacing: 1px;
  }

  .header-bar .right { font-weight: normal; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #chat::-webkit-scrollbar { width: 8px; }
  #chat::-webkit-scrollbar-track { background: #0a0a0a; }
  #chat::-webkit-scrollbar-thumb { background: #1a5a1a; }

  .msg {
    animation: typeIn 0.1s ease;
    font-size: 14px;
    line-height: 1.5;
  }

  @keyframes typeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .msg .prefix { font-weight: bold; }
  .msg.user .prefix { color: #33aaff; text-shadow: 0 0 5px rgba(51, 170, 255, 0.5); }
  .msg.assistant .prefix { color: #33ff33; }

  .msg .text {
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.system {
    color: #1a6a1a;
    font-style: italic;
  }

  #thinking {
    color: #1aaa1a;
    font-size: 13px;
    padding: 0 16px;
    min-height: 20px;
    flex-shrink: 0;
  }

  #input-area {
    padding: 6px 16px 10px;
    border-top: 1px solid #1a5a1a;
    display: flex;
    gap: 0;
    flex-shrink: 0;
    align-items: center;
  }

  #input-prompt {
    color: #33ff33;
    font-size: 14px;
    font-family: inherit;
    white-space: pre;
  }

  #input {
    flex: 1;
    background: transparent;
    border: none;
    color: #33ff33;
    font-size: 14px;
    font-family: 'Courier New', Consolas, monospace;
    outline: none;
    caret-color: #33ff33;
    text-shadow: 0 0 5px rgba(51, 255, 51, 0.5);
  }

  #input::placeholder { color: #1a5a1a; }

  .footer-bar {
    background: #33ff33;
    color: #000;
    padding: 2px 8px;
    font-size: 11px;
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .mode-toggle { cursor: pointer; letter-spacing: 1px; }
  .mode-toggle:hover { text-decoration: underline; }

  /* Amber sandbox mode overrides */
  body.sandbox-mode {
    color: #ffaa33;
    text-shadow: 0 0 5px rgba(255, 170, 51, 0.5);
  }
  body.sandbox-mode .header-bar { background: #ffaa33; }
  body.sandbox-mode .footer-bar { background: #ffaa33; }
  body.sandbox-mode::before { background: rgba(255, 170, 51, 0.03); }
  body.sandbox-mode #input { color: #ffaa33; caret-color: #ffaa33; }
  body.sandbox-mode #input::placeholder { color: #6a5a1a; }
  body.sandbox-mode #input-area { border-top-color: #5a4a1a; }
  body.sandbox-mode #input-prompt { color: #ffaa33; }
  body.sandbox-mode #thinking { color: #aa8a1a; }
  body.sandbox-mode .msg.assistant .prefix { color: #ffaa33; }
  body.sandbox-mode .msg.system { color: #6a5a1a; }
  body.sandbox-mode #chat::-webkit-scrollbar-thumb { background: #5a4a1a; }
  body.sandbox-mode #jensen-ghost {
    filter: grayscale(100%) brightness(1.5) sepia(100%) hue-rotate(10deg) saturate(4);
  }
</style>
</head>
<body>

<img id="jensen-ghost" src="/jensen.jpg" alt="">

<div class="header-bar">
  <span>JENSENCLAW v0.1 // NEMOCLAW TERMINAL</span>
  <span class="right" id="header-right">NEMOTRON-3-SUPER-120B | NVIDIA INFERENCE</span>
</div>

<div id="chat">
  <div class="msg system">System initialized. RoboJensen online.</div>
  <div class="msg system">Type a message below. He's enthusiastic. He cannot be stopped.</div>
</div>

<div id="thinking"></div>

<div id="input-area">
  <span id="input-prompt">you&gt; </span>
  <input type="text" id="input" placeholder="talk to robojensen..." autocomplete="off" autofocus>
</div>

<div class="footer-bar">
  <span>CTRL-C EXIT | RUNNING ON OPENSHELL + NEMOCLAW</span>
  <span class="mode-toggle" id="mode-toggle" onclick="toggleMode()">MODE: [CHAT] | SANDBOX</span>
  <span id="clock"></span>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const thinking = document.getElementById('thinking');
const clock = document.getElementById('clock');
const headerRight = document.getElementById('header-right');
const modeToggle = document.getElementById('mode-toggle');

let messages = [];
let streaming = false;
let sandboxMode = false;
let sandboxSessionId = null;

// Clock
setInterval(() => {
  const d = new Date();
  clock.textContent = d.toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
}, 1000);

function generateSessionId() {
  return Array.from(crypto.getRandomValues(new Uint8Array(8)))
    .map(b => b.toString(16).padStart(2, '0')).join('');
}

function toggleMode() {
  sandboxMode = !sandboxMode;
  document.body.classList.toggle('sandbox-mode', sandboxMode);

  // Update toggle label
  modeToggle.textContent = sandboxMode
    ? 'MODE: CHAT | [SANDBOX]'
    : 'MODE: [CHAT] | SANDBOX';

  // Update header
  headerRight.textContent = sandboxMode
    ? 'OPENCLAW AGENT | OPENSHELL SANDBOX'
    : 'NEMOTRON-3-SUPER-120B | NVIDIA INFERENCE';

  // Clear conversation
  messages = [];
  chat.innerHTML = '';

  if (sandboxMode) {
    sandboxSessionId = generateSessionId();
    addMsg('system', '--- SANDBOX MODE --- Routing through OpenClaw agent. Responses take 5-15s. Network egress is policy-controlled.');
  } else {
    sandboxSessionId = null;
    addMsg('system', 'System initialized. RoboJensen online.');
    addMsg('system', 'Type a message below. He\'s enthusiastic. He cannot be stopped.');
  }

  input.focus();
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  if (role === 'system') {
    div.textContent = text;
  } else {
    const prefix = document.createElement('span');
    prefix.className = 'prefix';
    prefix.textContent = role === 'user' ? 'you> ' : 'robojensen> ';

    const content = document.createElement('span');
    content.className = 'text';
    content.textContent = text;

    div.appendChild(prefix);
    div.appendChild(content);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function typewriterReveal(span, text, charDelay = 35) {
  return new Promise((resolve) => {
    let i = 0;
    function tick() {
      if (i < text.length) {
        span.textContent += text[i];
        chat.scrollTop = chat.scrollHeight;
        i++;
        setTimeout(tick, charDelay);
      } else {
        resolve();
      }
    }
    tick();
  });
}

async function sendSandboxMessage(text) {
  streaming = true;
  const startTime = Date.now();

  // Multi-phase loading indicator
  thinking.textContent = '[ CONNECTING TO SANDBOX ] ...';
  const loadingInterval = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    if (elapsed < 2) {
      thinking.textContent = '[ CONNECTING TO SANDBOX ] ...';
    } else if (elapsed < 5) {
      thinking.textContent = '[ AGENT THINKING ] *click click*';
    } else {
      thinking.textContent = `[ AGENT WORKING ] ${Math.floor(elapsed)}s ...`;
    }
  }, 500);

  try {
    const res = await fetch('/api/sandbox-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionId: sandboxSessionId }),
    });

    clearInterval(loadingInterval);

    const data = await res.json();

    if (!res.ok || data.error) {
      thinking.textContent = '';
      addMsg('system', `ERROR: ${data.error || res.statusText}. Check \`openshell term\` for pending approvals.`);
      return;
    }

    thinking.textContent = '';
    const msgDiv = addMsg('assistant', '');
    const textSpan = msgDiv.querySelector('.text');
    await typewriterReveal(textSpan, data.response);
  } catch (err) {
    clearInterval(loadingInterval);
    thinking.textContent = '';
    addMsg('system', `CONNECTION ERROR: ${err.message}`);
  } finally {
    streaming = false;
    input.focus();
  }
}

async function sendChatMessage(text) {
  streaming = true;
  thinking.textContent = '[ THINKING ] ...';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages }),
    });

    if (!res.ok) {
      const err = await res.json();
      thinking.textContent = '';
      addMsg('system', `ERROR: ${err.error || res.statusText}`);
      return;
    }

    thinking.textContent = '[ STREAMING ] ...';

    const msgDiv = addMsg('assistant', '');
    const textSpan = msgDiv.querySelector('.text');
    let fullText = '';

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;

        try {
          const parsed = JSON.parse(data);
          const delta = parsed.choices?.[0]?.delta;
          const chunk = delta?.content || delta?.reasoning_content || '';
          if (chunk) {
            fullText += chunk;
            textSpan.textContent = fullText;
            chat.scrollTop = chat.scrollHeight;
          }
        } catch {}
      }
    }

    messages.push({ role: 'assistant', content: fullText });
  } catch (err) {
    addMsg('system', `CONNECTION ERROR: ${err.message}`);
  } finally {
    streaming = false;
    thinking.textContent = '';
    input.focus();
  }
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || streaming) return;

  input.value = '';
  addMsg('user', text);

  if (sandboxMode) {
    await sendSandboxMessage(text);
  } else {
    messages.push({ role: 'user', content: text });
    await sendChatMessage(text);
  }
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
